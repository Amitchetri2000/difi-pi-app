<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Pi Payment</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; }
    button { padding: 15px 30px; font-size: 20px; background: #4CAF50; color: white; border: none; border-radius: 10px; }
    #status { margin-top: 30px; font-size: 18px; }
  </style>
</head>
<body>
  <h1>My First Pi Payment App</h1>
  <p>Click the button to pay 0.01 Pi (test)</p>
  <button onclick="makePayment()">Pay 0.01 Pi</button>
  <div id="status">Status: Waiting...</div>

  <script>
    // Initialize Pi SDK
    Pi.init({ version: "2.0" });

    let user;

    async function authenticate() {
      try {
        user = await Pi.authenticate(["payments", "username"]);
        document.getElementById("status").innerHTML = "✅ Logged in as: " + (user.username || "User");
      } catch (e) {
        document.getElementById("status").innerHTML = "❌ Login failed. Open this in Pi Browser.";
      }
    }

    async function makePayment() {
      document.getElementById("status").innerHTML = "Opening payment...";

      const paymentData = {
        amount: 0.01,
        memo: "Test payment from my app",
        metadata: { order: "test123" }
      };

      const callbacks = {
        onReadyForServerApproval: function(paymentId) {
          document.getElementById("status").innerHTML = "Payment approved by user. (Server part will handle in real app)";
          console.log("Ready for approval:", paymentId);
          // For beginner testing, we just show success message
          setTimeout(() => {
            document.getElementById("status").innerHTML = "✅ Test Payment Flow Started! Check your Pi app.";
          }, 2000);
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          document.getElementById("status").innerHTML = `✅ SUCCESS! Transaction ID: ${txid}`;
          console.log("Completed with txid:", txid);
        },
        onCancel: function(paymentId) {
          document.getElementById("status").innerHTML = "Payment cancelled.";
        },
        onError: function(error) {
          document.getElementById("status").innerHTML = "Error: " + error.message;
        }
      };

      try {
        Pi.createPayment(paymentData, callbacks);
      } catch (e) {
        document.getElementById("status").innerHTML = "Error starting payment.";
      }
    }

    // Auto login when page opens
    window.onload = authenticate;
  </script>
</body>
</html>
